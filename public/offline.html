<!doctype html>
<html lang="lo">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ODG HRM Offline</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #eef4fb;
        --card: #ffffff;
        --brand: #21487a;
        --text: #152d4a;
        --muted: #5f7497;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: linear-gradient(180deg, var(--bg) 0%, #ffffff 100%);
        color: var(--text);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(100%, 420px);
        border: 1px solid rgba(33, 72, 122, 0.12);
        border-radius: 28px;
        background: var(--card);
        padding: 28px;
        box-shadow: 0 22px 44px -28px rgba(21, 45, 74, 0.45);
      }

      .badge {
        display: inline-block;
        border-radius: 999px;
        background: rgba(33, 72, 122, 0.1);
        color: var(--brand);
        padding: 8px 12px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.12em;
      }

      h1 {
        margin: 16px 0 10px;
        font-size: 28px;
      }

      p {
        margin: 0;
        line-height: 1.6;
        color: var(--muted);
      }

      a {
        display: inline-flex;
        margin-top: 22px;
        border-radius: 14px;
        background: var(--brand);
        color: white;
        padding: 12px 18px;
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="badge">ODG HRM</div>
      <h1>ບໍ່ມີສັນຍານອິນເຕີເນັດ</h1>
      <p>
        ກະລຸນາກວດສອບການເຊື່ອມຕໍ່ ແລະ ລອງເຂົ້າອີກຄັ້ງ.
        ເມື່ອອິນເຕີເນັດກັບຄືນມາ ທ່ານສາມາດໃຊ້ລະບົບໄດ້ຕາມປົກກະຕິ.
      </p>
      <a href="/home">ກັບໄປຫນ້າຫຼັກ</a>
    </main>
  </body>
</html>
